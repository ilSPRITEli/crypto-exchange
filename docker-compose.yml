services:
  postgres:
    image: postgres:17
    container_name: crypto_exchange_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_exchange_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
